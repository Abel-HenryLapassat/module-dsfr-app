components:
  schemas:
    Error404:
      description: Not found
      type: object
      properties:
        error:
          description: Error message
          type: string
        status:
          description: Error status
          type: integer
          enum:
          - 404
    DsfrSociete:
      description: Company
      type: object
      properties:
        dsfrSocLogo:
          description: Soc logo
          type: object
        dsfrSocSite:
          description: Soc site
          type: string
          maxLength: 100
        dsfrSocSecteur:
          description: Soc secteur
          type: string
          maxLength: 100
          enum:
          - AS
          - A
          - AC
          - BTP
          - JF
          - TR
          - T
          - U
        dsfrSocNom:
          description: Soc nom
          type: string
          maxLength: 100
        row_id:
          description: Unique technical row ID
          type: string
          maxLength: 11
        dsfrSocPrivee:
          description: Soc privee
          type: string
          maxLength: 100
          enum:
          - PRV
          - PUB
    ArrayOfDsfrSociete:
      description: List of Company
      type: array
      items:
        $ref: '#/components/schemas/DsfrSociete'
    ArrayOfDsfrEmploye:
      description: List of Employee
      type: array
      items:
        $ref: '#/components/schemas/DsfrEmploye'
    PublicationResult:
      description: Publication result
      type: object
      properties:
        mime:
          description: MIME type
          type: string
        content:
          description: Content (plain text or base64 encoded)
          type: string
    PlaceData:
      description: Place data
      type: object
      properties:
        coord:
          description: Geographical coordinates
          type: string
        address:
          description: Address
          type: string
        row_id:
          description: Row ID
          type: string
        label1:
          description: 'Label #1'
          type: string
        label2:
          description: 'Label #2'
          type: string
        label3:
          description: 'Label #3'
          type: string
    PlaceMapData:
      description: Places map data
      type: object
      properties:
        places:
          description: Places
          type: array
          items:
            $ref: '#/components/schemas/PlaceData'
        name:
          description: Name
          type: string
    DsfrEmploye:
      description: Employee
      type: object
      properties:
        dsfrEmpTel:
          description: Emp tel
          type: string
          maxLength: 100
        dsfrEmpNom:
          description: Emp nom
          type: string
          maxLength: 100
        dsfrEmpPrenom:
          description: Emp prenom
          type: string
          maxLength: 100
        dsfrEmpSocId__dsfrSocNom:
          description: Emp soc id Soc nom
          type: string
          maxLength: 100
        row_id:
          description: Unique technical row ID
          type: string
          maxLength: 11
        dsfrEmpSocId__dsfrSocLogo:
          description: Emp soc id Soc logo
          type: object
        dsfrEmpId:
          description: Emp id
          type: integer
        dsfrEmpMail:
          description: Emp mail
          type: string
          maxLength: 100
        dsfrEmpSocId:
          description: Emp soc id
          type: string
          maxLength: 11
    ActionResult:
      description: Action result
      type: object
      properties:
        result:
          description: Action result
          type: string
    TreeviewData:
      type: object
      properties:
        item:
          description: Object item with lists of linked objects' items
          type: object
    Error400:
      description: Bad request
      type: object
      properties:
        error:
          description: Error message
          type: string
        status:
          description: Error status
          type: integer
          enum:
          - 400
    Error401:
